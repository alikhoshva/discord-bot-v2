services:
  discord-bot:
    image: grimlight/discord-bot:latest
    container_name: discord_bot
    restart: unless-stopped
    depends_on:
      nodelink:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - LAVALINK_HOST=nodelink
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD}
      - GEMINI_MODEL=${GEMINI_MODEL}
    networks:
      - bot-network

  nodelink:
    image: performanc/nodelink:latest
    container_name: nodelink
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2333 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-network
    environment:
      - NODELINK_SERVER_HOST=0.0.0.0
      - NODELINK_SERVER_PORT=2333
      - NODELINK_SERVER_PASSWORD=${LAVALINK_PASSWORD}
      - NODELINK_SOURCES_SPOTIFY_ENABLED=true
      - NODELINK_SOURCES_SPOTIFY_CLIENTID=${SPOTIFY_CLIENT_ID}
      - NODELINK_SOURCES_SPOTIFY_CLIENTSECRET=${SPOTIFY_CLIENT_SECRET}
      - NODELINK_SOURCES_YANDEX_ENABLED=false
    ports:
      - 2333:2333
    deploy:
      resources:
        limits:
          cpus: '2.0'      # Max 2 CPU cores
          memory: 2G       # Max 2GB RAM
        reservations:
          cpus: '0.5'      # Reserve half a core
          memory: 512M     # Reserve 512MB RAM

networks:
  bot-network:
    name: bot-network
